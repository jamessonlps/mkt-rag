name: dataops-knowledge-hub

services:
  # ----------------------------------------------------------------------
  # Ledger — PostgreSQL 16 (structured data, Text-to-SQL)
  # ----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dataops-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dataops-network

  # ----------------------------------------------------------------------
  # Events/Logs — MongoDB 7 (semi-structured event documents)
  # ----------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: dataops-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dataops-network

  # ----------------------------------------------------------------------
  # Memory — Qdrant (vector DB for semantic search)
  # ----------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dataops-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dataops-network

  # ----------------------------------------------------------------------
  # Brain — Neo4j 5 (graph DB for relationships and lineage)
  # ----------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: dataops-neo4j
    restart: unless-stopped
    env_file: .env
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    ports:
      - "7474:7474"   # HTTP UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dataops-network

  # ----------------------------------------------------------------------
  # Data Lake — SeaweedFS (S3-compatible object storage)
  # ----------------------------------------------------------------------
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: dataops-seaweedfs
    restart: unless-stopped
    command: server -s3 -dir=/data
    ports:
      - "8333:8333"   # S3 API
      - "9333:9333"   # Master
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dataops-network

# --------------------------------------------------------------------------
# Networks
# --------------------------------------------------------------------------
networks:
  dataops-network:
    name: dataops-network
    driver: bridge

# --------------------------------------------------------------------------
# Volumes — persistent storage for each service
# --------------------------------------------------------------------------
volumes:
  pg_data:
  mongo_data:
  qdrant_data:
  neo4j_data:
  seaweedfs_data:
